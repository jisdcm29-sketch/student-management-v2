<div class="v2-teacher-page">
  <div class="v2-teacher-header">
    <div>
      <h2 class="v2-teacher-title">교사 정보 패널</h2>
      <div class="v2-teacher-subtitle">로그인 사용자 자동 매칭 + 직접 입력 저장</div>
    </div>
    <div class="v2-teacher-actions">
      <button type="button" class="v2-teacher-btn secondary" id="V2_Teacher_refreshButton">새로고침</button>
      <button type="button" class="v2-teacher-btn primary" id="V2_Teacher_saveButton">교사 정보 저장</button>
    </div>
  </div>

  <div class="v2-teacher-notice error" id="V2_Teacher_errorBox" style="display:none;"></div>
  <div class="v2-teacher-notice success" id="V2_Teacher_successBox" style="display:none;"></div>
  <div class="v2-teacher-loading" id="V2_Teacher_loadingBox" style="display:none;">불러오는 중...</div>

  <div class="v2-teacher-card">
    <div class="v2-teacher-card-title">현재 로그인 교사 정보</div>

    <div class="v2-teacher-status-box" id="V2_Teacher_statusBox">
      자동 매칭 여부를 확인하는 중이다.
    </div>

    <div class="v2-teacher-form-grid">
      <div class="v2-teacher-form-item">
        <label for="V2_Teacher_teacherId">교사 ID</label>
        <input type="text" id="V2_Teacher_teacherId" placeholder="자동 생성 또는 기존 값 사용">
      </div>

      <div class="v2-teacher-form-item">
        <label for="V2_Teacher_teacherName">교사명</label>
        <input type="text" id="V2_Teacher_teacherName" placeholder="교사명을 입력해라.">
      </div>

      <div class="v2-teacher-form-item">
        <label for="V2_Teacher_teacherEmail">교사 이메일</label>
        <input type="text" id="V2_Teacher_teacherEmail" placeholder="teacher@example.com">
      </div>

      <div class="v2-teacher-form-item">
        <label for="V2_Teacher_role">권한</label>
        <input type="text" id="V2_Teacher_role" placeholder="예: teacher / admin">
      </div>
    </div>
  </div>

  <div class="v2-teacher-card">
    <div class="v2-teacher-card-title">등록된 교사 목록</div>
    <div class="v2-teacher-table-wrap">
      <table class="v2-teacher-table">
        <thead>
          <tr>
            <th>교사명</th>
            <th>교사 ID</th>
            <th>이메일</th>
            <th>권한</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="V2_Teacher_tableBody">
          <tr>
            <td colspan="5">교사 목록을 불러오는 중이다.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
  .v2-teacher-page {
    padding: 16px;
    box-sizing: border-box;
  }

  .v2-teacher-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .v2-teacher-title {
    margin: 0;
    font-size: 24px;
    font-weight: 700;
    color: #111827;
  }

  .v2-teacher-subtitle {
    margin-top: 4px;
    font-size: 13px;
    color: #6b7280;
  }

  .v2-teacher-actions {
    display: flex;
    gap: 8px;
  }

  .v2-teacher-btn {
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  .v2-teacher-btn.primary {
    background: #2563eb;
    color: #ffffff;
  }

  .v2-teacher-btn.secondary {
    background: #e5e7eb;
    color: #111827;
  }

  .v2-teacher-btn:disabled {
    opacity: 0.65;
    cursor: default;
  }

  .v2-teacher-notice {
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 12px;
    font-size: 14px;
    white-space: pre-line;
  }

  .v2-teacher-notice.error {
    background: #fef2f2;
    color: #991b1b;
  }

  .v2-teacher-notice.success {
    background: #eff6ff;
    color: #1d4ed8;
  }

  .v2-teacher-loading {
    margin-bottom: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    background: #f8fafc;
    color: #334155;
    font-size: 14px;
  }

  .v2-teacher-card {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 16px;
    box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
  }

  .v2-teacher-card-title {
    font-size: 16px;
    font-weight: 700;
    color: #111827;
    margin-bottom: 12px;
  }

  .v2-teacher-status-box {
    background: #f8fafc;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
    font-size: 14px;
    white-space: pre-line;
    color: #334155;
  }

  .v2-teacher-form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .v2-teacher-form-item label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: #374151;
    font-weight: 700;
  }

  .v2-teacher-form-item input {
    width: 100%;
    box-sizing: border-box;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 14px;
    color: #111827;
    background: #ffffff;
  }

  .v2-teacher-table-wrap {
    overflow-x: auto;
  }

  .v2-teacher-table {
    width: 100%;
    border-collapse: collapse;
  }

  .v2-teacher-table th,
  .v2-teacher-table td {
    border-bottom: 1px solid #e5e7eb;
    padding: 12px 10px;
    text-align: center;
    font-size: 14px;
  }

  .v2-teacher-table th {
    background: #eff6ff;
    color: #1e3a8a;
    font-weight: 700;
  }

  .v2-teacher-table td:first-child {
    text-align: left;
    font-weight: 700;
    color: #111827;
  }

  @media (max-width: 900px) {
    .v2-teacher-header {
      flex-direction: column;
      align-items: flex-start;
    }

    .v2-teacher-form-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<script>
  var V2_TEACHER_STATE = {
    currentTeacher: null,
    teacherList: []
  };

  function V2_Teacher_setLoading_(isLoading) {
    try {
      var loadingBox = document.getElementById('V2_Teacher_loadingBox');
      var refreshButton = document.getElementById('V2_Teacher_refreshButton');
      var saveButton = document.getElementById('V2_Teacher_saveButton');

      if (loadingBox) {
        loadingBox.style.display = isLoading ? 'block' : 'none';
      }

      if (refreshButton) {
        refreshButton.disabled = !!isLoading;
      }

      if (saveButton) {
        saveButton.disabled = !!isLoading;
      }
    } catch (error) {
      console.error(error);
    }
  }

  function V2_Teacher_showError_(message) {
    try {
      var box = document.getElementById('V2_Teacher_errorBox');
      if (!box) {
        return;
      }

      box.style.display = 'block';
      box.textContent = message || '오류가 발생했다.';
    } catch (error) {
      console.error(error);
    }
  }

  function V2_Teacher_clearError_() {
    try {
      var box = document.getElementById('V2_Teacher_errorBox');
      if (!box) {
        return;
      }

      box.style.display = 'none';
      box.textContent = '';
    } catch (error) {
      console.error(error);
    }
  }

  function V2_Teacher_showSuccess_(message) {
    try {
      var box = document.getElementById('V2_Teacher_successBox');
      if (!box) {
        return;
      }

      box.style.display = 'block';
      box.textContent = message || '';
    } catch (error) {
      console.error(error);
    }
  }

  function V2_Teacher_clearSuccess_() {
    try {
      var box = document.getElementById('V2_Teacher_successBox');
      if (!box) {
        return;
      }

      box.style.display = 'none';
      box.textContent = '';
    } catch (error) {
      console.error(error);
    }
  }

  function V2_Teacher_escapeHtml_(value) {
    try {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    } catch (error) {
      return '';
    }
  }

  function V2_Teacher_getRequest_() {
    try {
      return {
        teacherId: String(document.getElementById('V2_Teacher_teacherId').value || '').trim(),
        teacherName: String(document.getElementById('V2_Teacher_teacherName').value || '').trim(),
        teacherEmail: String(document.getElementById('V2_Teacher_teacherEmail').value || '').trim(),
        role: String(document.getElementById('V2_Teacher_role').value || '').trim()
      };
    } catch (error) {
      return {
        teacherId: '',
        teacherName: '',
        teacherEmail: '',
        role: ''
      };
    }
  }

  function V2_Teacher_validateRequest_(request) {
    try {
      request = request || V2_Teacher_getRequest_();

      if (!request.teacherName) {
        throw new Error('교사명을 입력해라.');
      }

      if (!request.teacherEmail) {
        throw new Error('교사 이메일을 입력해라.');
      }

      if (request.teacherEmail.indexOf('@') === -1) {
        throw new Error('교사 이메일 형식이 올바르지 않다.');
      }

      return request;
    } catch (error) {
      throw error;
    }
  }

  function V2_Teacher_renderCurrentTeacher_(data) {
    try {
      data = data || {};
      V2_TEACHER_STATE.currentTeacher = data;

      document.getElementById('V2_Teacher_teacherId').value = data.teacherId || '';
      document.getElementById('V2_Teacher_teacherName').value = data.teacherName || '';
      document.getElementById('V2_Teacher_teacherEmail').value = data.teacherEmail || '';
      document.getElementById('V2_Teacher_role').value = data.role || '';

      var statusBox = document.getElementById('V2_Teacher_statusBox');
      if (!statusBox) {
        return;
      }

      var lines = [];
      lines.push('자동 매칭: ' + (data.matched ? '성공' : '실패'));
      lines.push('교사명: ' + (data.teacherName || '-'));
      lines.push('교사 이메일: ' + (data.teacherEmail || '-'));
      lines.push('직접 입력 허용: ' + (data.manualInputAllowed ? '예' : '아니오'));

      if (!data.matched) {
        lines.push('안내: 자동 매칭 실패 시 직접 입력 후 저장해라.');
      }

      statusBox.textContent = lines.join('\n');
    } catch (error) {
      console.error(error);
    }
  }

  function V2_Teacher_renderTeacherList_(items) {
    try {
      items = Array.isArray(items) ? items : [];
      V2_TEACHER_STATE.teacherList = items;

      var body = document.getElementById('V2_Teacher_tableBody');
      if (!body) {
        return;
      }

      if (items.length < 1) {
        body.innerHTML = '<tr><td colspan="5">등록된 교사 정보가 없다.</td></tr>';
        return;
      }

      var html = '';

      for (var i = 0; i < items.length; i++) {
        var item = items[i] || {};
        html += '<tr>';
        html += '<td>' + V2_Teacher_escapeHtml_(item.teacherName || '') + '</td>';
        html += '<td>' + V2_Teacher_escapeHtml_(item.teacherId || '') + '</td>';
        html += '<td>' + V2_Teacher_escapeHtml_(item.teacherEmail || '') + '</td>';
        html += '<td>' + V2_Teacher_escapeHtml_(item.role || '') + '</td>';
        html += '<td>' + V2_Teacher_escapeHtml_(item.status || '') + '</td>';
        html += '</tr>';
      }

      body.innerHTML = html;
    } catch (error) {
      console.error(error);
    }
  }

  function V2_Teacher_loadCurrentTeacher_() {
    try {
      V2_Teacher_clearError_();
      V2_Teacher_clearSuccess_();
      V2_Teacher_setLoading_(true);

      google.script.run
        .withSuccessHandler(function(response) {
          try {
            if (!response || response.success !== true || !response.data) {
              V2_Teacher_showError_(response && response.message ? response.message : '교사 정보를 불러오지 못했다.');
              V2_Teacher_renderCurrentTeacher_({});
              V2_Teacher_setLoading_(false);
              return;
            }

            V2_Teacher_renderCurrentTeacher_(response.data);
            V2_Teacher_loadTeacherList_(response.message || '교사 정보를 불러왔다.');
          } catch (innerError) {
            V2_Teacher_setLoading_(false);
            V2_Teacher_showError_(innerError.message || '교사 정보 표시 중 오류가 발생했다.');
          }
        })
        .withFailureHandler(function(error) {
          V2_Teacher_setLoading_(false);
          V2_Teacher_showError_(error && error.message ? error.message : '교사 정보 조회 중 오류가 발생했다.');
          V2_Teacher_renderCurrentTeacher_({});
        })
        .V2_TeacherService_getCurrentTeacherInfo({});
    } catch (error) {
      V2_Teacher_setLoading_(false);
      V2_Teacher_showError_(error.message || '교사 정보 조회 실행 중 오류가 발생했다.');
    }
  }

  function V2_Teacher_loadTeacherList_(successMessage) {
    try {
      google.script.run
        .withSuccessHandler(function(response) {
          V2_Teacher_setLoading_(false);

          if (!response || response.success !== true || !response.data) {
            V2_Teacher_showError_(response && response.message ? response.message : '교사 목록을 불러오지 못했다.');
            V2_Teacher_renderTeacherList_([]);
            return;
          }

          V2_Teacher_renderTeacherList_(response.data.items || []);
          if (successMessage) {
            V2_Teacher_showSuccess_(successMessage);
          }
        })
        .withFailureHandler(function(error) {
          V2_Teacher_setLoading_(false);
          V2_Teacher_showError_(error && error.message ? error.message : '교사 목록 조회 중 오류가 발생했다.');
          V2_Teacher_renderTeacherList_([]);
        })
        .V2_TeacherService_getTeacherList();
    } catch (error) {
      V2_Teacher_setLoading_(false);
      V2_Teacher_showError_(error.message || '교사 목록 조회 실행 중 오류가 발생했다.');
    }
  }

  function V2_Teacher_saveTeacher_() {
    try {
      V2_Teacher_clearError_();
      V2_Teacher_clearSuccess_();

      var request = V2_Teacher_validateRequest_(V2_Teacher_getRequest_());
      V2_Teacher_setLoading_(true);

      google.script.run
        .withSuccessHandler(function(response) {
          if (!response || response.success !== true || !response.data) {
            V2_Teacher_setLoading_(false);
            V2_Teacher_showError_(response && response.message ? response.message : '교사 정보 저장에 실패했다.');
            return;
          }

          V2_Teacher_renderCurrentTeacher_(response.data);
          V2_Teacher_loadTeacherList_(response.message || '교사 정보를 저장했다.');
        })
        .withFailureHandler(function(error) {
          V2_Teacher_setLoading_(false);
          V2_Teacher_showError_(error && error.message ? error.message : '교사 정보 저장 중 오류가 발생했다.');
        })
        .V2_TeacherService_saveManualTeacherInfo(request);
    } catch (error) {
      V2_Teacher_setLoading_(false);
      V2_Teacher_showError_(error.message || '교사 정보 저장 실행 중 오류가 발생했다.');
    }
  }

  function V2_Teacher_bindEvents_() {
    try {
      var refreshButton = document.getElementById('V2_Teacher_refreshButton');
      var saveButton = document.getElementById('V2_Teacher_saveButton');

      if (refreshButton && !refreshButton.getAttribute('data-v2-bound')) {
        refreshButton.addEventListener('click', V2_Teacher_loadCurrentTeacher_);
        refreshButton.setAttribute('data-v2-bound', 'true');
      }

      if (saveButton && !saveButton.getAttribute('data-v2-bound')) {
        saveButton.addEventListener('click', V2_Teacher_saveTeacher_);
        saveButton.setAttribute('data-v2-bound', 'true');
      }
    } catch (error) {
      console.error(error);
    }
  }

  window.addEventListener('load', function() {
    try {
      V2_Teacher_bindEvents_();
      V2_Teacher_loadCurrentTeacher_();
    } catch (error) {
      V2_Teacher_showError_(error.message || '교사 패널 초기화 중 오류가 발생했다.');
    }
  });
</script>
