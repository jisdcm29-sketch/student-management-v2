<!DOCTYPE html>
<html>
  <head>

    <style>
      * {
        box-sizing: border-box;
      }

      body {

        margin-bottom: 12px;
        font-size: 13px;

      }

      }

      .status-grid {

        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .status-box {
        border: 1px solid #d8e2ee;
        border-radius: 12px;
        padding: 14px;
        font-size: 13px;
        white-space: pre-line;
        min-height: 120px;
      }

        background: #f8fbff;
        border-color: #d9e6f5;
        color: #334155;
      }

      .status-box.guide {
        background: #fffaf2;
        border-color: #f3dfb7;
        color: #6c4d10;
      }

      .form-grid {

        grid-template-columns: repeat(2, minmax(0, 1fr));

        font-size: 13px;
        font-weight: bold;
        color: #344054;

        background: #fff;

      }

      .field textarea {
        min-height: 110px;

      }

      .field textarea:focus {
        outline: none;
        border-color: #1f4e78;

        padding: 10px 14px;

        font-weight: bold;

      .btn:disabled {
        opacity: 0.6;
        cursor: default;

      .btn-primary {
        background: #1f4e78;
        color: #ffffff;
      }

      .btn-secondary {
        background: #e7eef7;
        color: #1f3347;
      }

      .btn-light {

        min-height: 140px;
        color: #334155;
      }

        .form-grid {
