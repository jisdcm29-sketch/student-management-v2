<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학생 목록</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f4f6f8;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .wrap {
      padding: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .title-box h2 {
      margin: 0;
      font-size: 22px;
      color: #1f4e78;
    }

    .title-box p {
      margin: 6px 0 0 0;
      font-size: 13px;
      color: #666;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-primary {
      background: #1f4e78;
      color: #fff;
    }

    .btn-secondary {
      background: #e9eef3;
      color: #333;
    }

    .summary {
      margin-bottom: 14px;
      font-size: 13px;
      color: #444;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
      white-space: pre-line;
    }

    .loading {
      display: none;
      margin-bottom: 12px;
      font-size: 13px;
      color: #666;
    }

    .error {
      display: none;
      margin-bottom: 12px;
      font-size: 13px;
      color: #b3261e;
      background: #fdecea;
      border: 1px solid #f3b7b2;
      border-radius: 8px;
      padding: 10px 12px;
      white-space: pre-line;
    }

    .empty {
      display: none;
      text-align: center;
      color: #666;
      border: 1px dashed #d0d7de;
      border-radius: 10px;
      padding: 28px 12px;
      font-size: 14px;
      background: #fafafa;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #fff;
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1040px;
    }

    thead {
      background: #1f4e78;
      color: #fff;
    }

    th, td {
      padding: 10px 12px;
      font-size: 13px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
    }

    tbody tr:hover {
      background: #f8fbff;
    }

    .status {
      display: inline-block;
      min-width: 64px;
      text-align: center;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .status-active {
      background: #e8f5e9;
      color: #196127;
    }

    .status-archived {
      background: #fff8e1;
      color: #8a5a00;
    }

    .status-delete-pending {
      background: #fff3e0;
      color: #b45f06;
    }

    .status-deleted {
      background: #fdecea;
      color: #b3261e;
    }

    .student-id {
      color: #1f4e78;
      font-weight: bold;
      white-space: nowrap;
    }

    .memo-cell {
      min-width: 180px;
      white-space: pre-line;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <div class="title-box">
          <h2>학생 목록</h2>
          <p>V2_Students 시트 기준으로 학생 목록을 조회한다.</p>
        </div>
        <div class="actions">
          <button class="btn btn-primary" type="button" onclick="V2_StudentList_openStudentForm_()">학생 등록</button>
          <button class="btn btn-secondary" type="button" onclick="V2_StudentList_load_()">새로고침</button>
          <button class="btn btn-secondary" type="button" onclick="google.script.host.close()">닫기</button>
        </div>
      </div>

      <div class="summary" id="summaryBox">학생 수: 0명</div>
      <div class="loading" id="loadingBox">학생 목록을 불러오는 중이다...</div>
      <div class="error" id="errorBox"></div>
      <div class="empty" id="emptyBox">등록된 학생이 없다.</div>

      <div class="table-wrap" id="tableWrap">
        <table>
          <thead>
            <tr>
              <th>학생 ID</th>
              <th>학생명</th>
              <th>반 ID</th>
              <th>상태</th>
              <th>학부모 이름</th>
              <th>학부모 연락처</th>
              <th>메모</th>
              <th>생성일</th>
              <th>수정일</th>
            </tr>
          </thead>
          <tbody id="studentTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    function V2_StudentList_setLoading_(isLoading) {
      try {
        var loadingBox = document.getElementById('loadingBox');
        if (loadingBox) {
          loadingBox.style.display = isLoading ? 'block' : 'none';
        }
      } catch (error) {
        console.error(error);
      }
    }

    function V2_StudentList_showError_(message) {
      try {
        var errorBox = document.getElementById('errorBox');
        var tableWrap = document.getElementById('tableWrap');
        var emptyBox = document.getElementById('emptyBox');

        if (tableWrap) {
          tableWrap.style.display = 'none';
        }

        if (emptyBox) {
          emptyBox.style.display = 'none';
        }

        if (!errorBox) {
          return;
        }

        errorBox.style.display = 'block';
        errorBox.textContent = message || '오류가 발생했다.';
      } catch (error) {
        console.error(error);
      }
    }

    function V2_StudentList_clearError_() {
      try {
        var errorBox = document.getElementById('errorBox');
        if (!errorBox) {
          return;
        }

        errorBox.style.display = 'none';
        errorBox.textContent = '';
      } catch (error) {
        console.error(error);
      }
    }

    function V2_StudentList_setSummary_(students) {
      try {
        students = Array.isArray(students) ? students : [];

        var activeCount = 0;
        var archivedCount = 0;
        var deletePendingCount = 0;

        for (var i = 0; i < students.length; i++) {
          var status = String(students[i] && students[i].status ? students[i].status : '').trim();

          if (status === '재학') {
            activeCount += 1;
          } else if (status === '보관') {
            archivedCount += 1;
          } else if (status === '삭제대기') {
            deletePendingCount += 1;
          }
        }

        var summaryBox = document.getElementById('summaryBox');
        if (summaryBox) {
          summaryBox.textContent =
            '학생 수: ' + students.length + '명\n' +
            '재학: ' + activeCount + '명 / 보관: ' + archivedCount + '명 / 삭제대기: ' + deletePendingCount + '명';
        }
      } catch (error) {
        console.error(error);
      }
    }

    function V2_StudentList_clearTable_() {
      try {
        var tbody = document.getElementById('studentTableBody');
        if (tbody) {
          tbody.innerHTML = '';
        }
      } catch (error) {
        console.error(error);
      }
    }

    function V2_StudentList_escapeHtml_(value) {
      try {
        return String(value === null || value === undefined ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      } catch (error) {
        return '';
      }
    }

    function V2_StudentList_getStatusClass_(status) {
      switch (String(status || '').trim()) {
        case '재학':
          return 'status status-active';
        case '보관':
          return 'status status-archived';
        case '삭제대기':
          return 'status status-delete-pending';
        case '완전삭제':
          return 'status status-deleted';
        default:
          return 'status';
      }
    }

    function V2_StudentList_getMemoText_(student) {
      try {
        student = student || {};
        return student.notes || student.memo || '';
      } catch (error) {
        return '';
      }
    }

    function V2_StudentList_render_(students) {
      try {
        var tableWrap = document.getElementById('tableWrap');
        var emptyBox = document.getElementById('emptyBox');
        var tbody = document.getElementById('studentTableBody');

        students = Array.isArray(students) ? students : [];

        V2_StudentList_clearTable_();
        V2_StudentList_setSummary_(students);

        if (students.length === 0) {
          if (tableWrap) {
            tableWrap.style.display = 'none';
          }

          if (emptyBox) {
            emptyBox.style.display = 'block';
          }

          return;
        }

        if (emptyBox) {
          emptyBox.style.display = 'none';
        }

        if (tableWrap) {
          tableWrap.style.display = 'block';
        }

        var html = '';

        students.forEach(function(student) {
          html += '<tr>';
          html += '<td class="student-id">' + V2_StudentList_escapeHtml_(student.studentId || '') + '</td>';
          html += '<td>' + V2_StudentList_escapeHtml_(student.studentName || '') + '</td>';
          html += '<td>' + V2_StudentList_escapeHtml_(student.classId || '') + '</td>';
          html += '<td><span class="' + V2_StudentList_getStatusClass_(student.status) + '">' + V2_StudentList_escapeHtml_(student.status || '') + '</span></td>';
          html += '<td>' + V2_StudentList_escapeHtml_(student.parentName || '') + '</td>';
          html += '<td>' + V2_StudentList_escapeHtml_(student.parentPhone || '') + '</td>';
          html += '<td class="memo-cell">' + V2_StudentList_escapeHtml_(V2_StudentList_getMemoText_(student)) + '</td>';
          html += '<td>' + V2_StudentList_escapeHtml_(student.createdAt || '') + '</td>';
          html += '<td>' + V2_StudentList_escapeHtml_(student.updatedAt || '') + '</td>';
          html += '</tr>';
        });

        if (tbody) {
          tbody.innerHTML = html;
        }
      } catch (error) {
        V2_StudentList_showError_('목록 렌더링 오류\n' + (error.message || error));
      }
    }

    function V2_StudentList_load_() {
      try {
        V2_StudentList_clearError_();
        V2_StudentList_setLoading_(true);

        google.script.run
          .withSuccessHandler(function(response) {
            try {
              V2_StudentList_setLoading_(false);

              if (response && response.success === true) {
                V2_StudentList_render_(response.data || []);
                return;
              }

              V2_StudentList_showError_(
                '학생 목록 조회 실패\n' +
                'message=' + (response && response.message ? response.message : '없음')
              );
            } catch (innerError) {
              V2_StudentList_showError_(
                '성공 응답 처리 오류\n' + (innerError.message || innerError)
              );
            }
          })
          .withFailureHandler(function(error) {
            V2_StudentList_setLoading_(false);
            V2_StudentList_showError_(
              '서버 실패 핸들러 실행\n' +
              (error && error.message ? error.message : JSON.stringify(error))
            );
          })
          .V2_StudentService_getStudentListForPopup(false);

      } catch (error) {
        V2_StudentList_setLoading_(false);
        V2_StudentList_showError_('학생 목록 로딩 오류\n' + (error.message || error));
      }
    }

    function V2_StudentList_openStudentForm_() {
      try {
        google.script.run
          .withSuccessHandler(function() {
            setTimeout(function() {
              V2_StudentList_load_();
            }, 1500);
          })
          .withFailureHandler(function(error) {
            V2_StudentList_showError_(
              error && error.message ? error.message : '학생 등록 창을 열 수 없다.'
            );
          })
          .V2_openStudentForm();
      } catch (error) {
        V2_StudentList_showError_(error.message || '학생 등록 창 처리 중 오류가 발생했다.');
      }
    }

    window.onload = function() {
      try {
        V2_StudentList_load_();
      } catch (error) {
        V2_StudentList_showError_(error.message || '학생 목록 초기 로딩 중 오류가 발생했다.');
      }
    };
  </script>
</body>
</html>
