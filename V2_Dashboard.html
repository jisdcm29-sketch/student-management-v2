<!-- V2_Dashboard.html -->
<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        color: #1f2937;
      }

      .page {
        padding: 20px;
      }

      .title-area {
        margin-bottom: 18px;
      }

      .title {
        margin: 0;
        font-size: 30px;
        font-weight: 800;
        color: #163e68;
        letter-spacing: -0.2px;
      }

      .desc {
        margin-top: 8px;
        font-size: 14px;
        color: #5b6470;
        line-height: 1.6;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d8e2ee;
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
        margin-bottom: 16px;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 12px;
        flex-wrap: wrap;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 180px;
      }

      .field label {
        font-size: 13px;
        font-weight: 700;
        color: #344054;
      }

      .field select {
        width: 100%;
        height: 40px;
        padding: 8px 10px;
        border: 1px solid #cdd6e1;
        border-radius: 10px;
        font-size: 13px;
        background: #fff;
      }

      .field select:focus {
        outline: none;
        border-color: #1f4e78;
        box-shadow: 0 0 0 2px rgba(31, 78, 120, 0.12);
      }

      .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .btn {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .btn-primary {
        background: #1f4e78;
        color: #ffffff;
      }

      .btn-light {
        background: #f3f4f6;
        color: #374151;
      }

      .loading-box {
        display: none;
        padding: 10px 12px;
        border-radius: 10px;
        margin-bottom: 12px;
        background: #eef4ff;
        border: 1px solid #d5e3ff;
        color: #274c77;
        font-size: 13px;
      }

      .notice {
        display: none;
        padding: 10px 12px;
        border-radius: 10px;
        margin-bottom: 12px;
        font-size: 13px;
        white-space: pre-line;
      }

      .notice.error {
        background: #fdecec;
        border: 1px solid #f5c2c7;
        color: #a61b1b;
      }

      .notice.success {
        background: #eaf7ee;
        border: 1px solid #b7e1c1;
        color: #1f6b3b;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
      }

      .summary-card {
        border: 1px solid #d8e2ee;
        border-radius: 14px;
        background: linear-gradient(180deg, #fbfdff 0%, #f4f8fd 100%);
        padding: 16px;
      }

      .summary-label {
        font-size: 14px;
        font-weight: 700;
        color: #667085;
        margin-bottom: 10px;
      }

      .summary-value {
        font-size: 30px;
        font-weight: 800;
        color: #1f3b5c;
        line-height: 1.2;
      }

      .summary-sub {
        margin-top: 10px;
        font-size: 13px;
        color: #667085;
        white-space: pre-line;
        line-height: 1.5;
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .status-box {
        border: 1px solid #d8e2ee;
        border-radius: 14px;
        padding: 16px;
        font-size: 13px;
        white-space: pre-line;
        min-height: 118px;
        line-height: 1.65;
      }

      .status-box.info {
        background: #f8fbff;
        border-color: #d9e6f5;
        color: #334155;
      }

      .status-box.guide {
        background: #fffaf2;
        border-color: #f3dfb7;
        color: #6c4d10;
      }

      .section-title {
        font-size: 20px;
        font-weight: 800;
        color: #163e68;
        margin-bottom: 14px;
        padding-left: 10px;
        border-left: 5px solid #1f4e78;
        letter-spacing: -0.1px;
      }

      .table-wrap {
        width: 100%;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #ffffff;
      }

      th,
      td {
        border: 1px solid #dbe5f0;
        padding: 10px 10px;
        font-size: 13px;
        text-align: left;
        vertical-align: top;
        word-break: break-word;
        white-space: pre-line;
      }

      th {
        background: #edf4fb;
        color: #1f3b5c;
        font-weight: 700;
      }

      .empty-box {
        padding: 24px;
        border: 1px dashed #cbd5e1;
        border-radius: 12px;
        background: #fcfdff;
        color: #667085;
        text-align: center;
        font-size: 13px;
      }

      .rate-good {
        color: #1f7a4d;
        font-weight: 700;
      }

      .rate-normal {
        color: #b26b00;
        font-weight: 700;
      }

      .rate-low {
        color: #b42318;
        font-weight: 700;
      }

      @media (max-width: 960px) {
        .summary-grid,
        .status-grid {
          grid-template-columns: 1fr;
        }

        .toolbar {
          flex-direction: column;
          align-items: stretch;
        }

        .field {
          min-width: 100%;
        }

        .title {
          font-size: 26px;
        }

        .section-title {
          font-size: 18px;
        }

        .summary-value {
          font-size: 26px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="title-area">
        <h1 class="title">홈 대시보드</h1>
        <div class="desc">반별 학생 수, 최근 7일 출석률, 반 평균 점수를 조회할 수 있다.</div>
      </div>

      <div class="panel">
        <div id="loadingBox" class="loading-box">대시보드 데이터를 불러오는 중이다.</div>
        <div id="errorBox" class="notice error"></div>
        <div id="successBox" class="notice success"></div>

        <div class="toolbar">
          <div class="field">
            <label for="periodDays">출석 집계 기간</label>
            <select id="periodDays">
              <option value="7" selected>최근 7일</option>
              <option value="14">최근 14일</option>
              <option value="30">최근 30일</option>
            </select>
          </div>

          <div class="btn-row">
            <button type="button" id="refreshButton" class="btn btn-primary" onclick="V2_Dashboard_loadSnapshot_()">새로고침</button>
            <button type="button" class="btn btn-light" onclick="V2_Dashboard_resetView_()">초기화</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="section-title">대시보드 요약</div>
        <div id="summaryGrid" class="summary-grid"></div>
      </div>

      <div class="panel">
        <div class="status-grid">
          <div id="statusBox" class="status-box info"></div>
          <div id="guideBox" class="status-box guide"></div>
        </div>
      </div>

      <div class="panel">
        <div class="section-title">반별 현황</div>
        <div class="table-wrap">
          <div id="tableWrap" class="empty-box">대시보드 데이터를 불러오는 중이다.</div>
        </div>
      </div>
    </div>

    <?!= V2_include('V2_Dashboard_JS'); ?>
  </body>
</html>
